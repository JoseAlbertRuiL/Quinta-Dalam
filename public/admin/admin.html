<!doctype html>
<html lang="es-MX">
  <head>
    <title>Admin Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- ! IMPORTANTE - NO CAMBIAR -->
    <!-- ! noindex: No indexamos páginas de administración a los motores de búsqueda, mayor seguridad y privacidad -->
    <!-- ! nofollow: No permite el redireccionamiento de otras enlaces -->
    <link rel="icon" type="image/png" href="../images/admin-login-icon.png" />
    <!-- * Icono: En este caso, estamos añadiendo nuestra 'favicon', es decir, el ícono que aparecerá al lado del título de la página web en el navegador de los cliente -->

    <!-- * FontAwesome: Librería de iconos -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- ! CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
  </head>
  <body>
    <header class="container has-text-centered">
      <h1 class="title mt-5 is-2">Bienvenido Sr. Admin</h1>
    </header>

    <main>
      <section id="login-admin" class="section">
        <h2 class="subtitle is-4">
          <span class="icon">
            <i class="fa-solid fa-lock"></i>
          </span>
          Inicio de sesión
        </h2>

        <div>
          <form method="post" action="admin.html">
            <fieldset id="admin-credenciales" class="box">
              <legend class="subtitle is-5">Credenciales de Acceso</legend>
              <!-- ? Campos de Llenado -->
              <div class="field">
                <label class="label">
                  Usuario:
                  <input
                    class="control"
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Ingrese su usuario"
                    required
                    pattern="^[a-zA-Z0-9_.]+$"
                    title="Por favor, ingrese un usuario válido"
                  />
                </label>
              </div>

              <div class="field">
                <label class="label">
                  Contraseña:
                  <input
                    class="control"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Ingrese su contraseña"
                    required
                    title="Por favor, ingrese su contraseña"
                  />
                </label>
              </div>
              <!-- ? Botones -->
              <div class="buttons has-addons is-centered">
                <button
                  type="submit"
                  class="button is-success is-medium is-reponsive is-outlined"
                >
                  Iniciar Sesión
                </button>
                <button
                  type="delete"
                  class="button is-danger is-medium is-outlined"
                >
                  Limpiar Datos
                </button>
              </div>
            </fieldset>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer has-background-black-bis">
      <div class="content has-text-centered">
        <p>
          Copyright &copy; 2026 Hotel Quinta Dalam. Todos los derechos
          reservados.
        </p>
      </div>
    </footer>
  </body>
</html>
